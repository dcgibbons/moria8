name: Discord Notifications

on:
  push:
    branches: []
  issues:
    types: []
  pull_request:
    types: []
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send pretty notification to #changelog
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            COLOR="0x22C55E"
            TITLE="📦 moria8 ${{ github.event.release.tag_name }} RELEASED!"
            DESC="${{ github.event.release.body || 'No release notes provided.' }}"
            URL="${{ github.event.release.html_url }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            COLOR="0x3B82F6"
            TITLE="🪓 Push to \`${{ github.ref_name }}\`"
            DESC="${{ github.event.commits[0].message || 'Multiple commits pushed' }}"
            URL="${{ github.event.compare }}"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            COLOR="0xEF4444"
            TITLE="🐛 New Issue #${{ github.event.issue.number }}"
            DESC="${{ github.event.issue.title }}\nby ${{ github.event.issue.user.login }}"
            URL="${{ github.event.issue.html_url }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            COLOR="0xA855F7"
            TITLE="🔀 New Pull Request #${{ github.event.pull_request.number }}"
            DESC="${{ github.event.pull_request.title }}\nby ${{ github.event.pull_request.user.login }}"
            URL="${{ github.event.pull_request.html_url }}"
          else
            COLOR="0x64748B"
            TITLE="Test Notification"
            DESC="Manual trigger from GitHub Actions"
            URL="https://github.com/${{ github.repository }}"
          fi

          curl -H "Content-Type: application/json" \
            -d '{
              "username": "moria8 Bot",
              "avatar_url": "https://raw.githubusercontent.com/dcgibbons/moria8/main/artwork/moria8_loading_art_c64.png",
              "embeds": [{
                "color": '"${COLOR}"',
                "title": "'"${TITLE}"'",
                "description": "'"${DESC}"'",
                "url": "'"${URL}"'",
                "footer": {
                  "text": "moria8 • dcgibbons/moria8"
                },
                "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
